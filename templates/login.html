{% extends "base.html" %}

{% block content %}
<div
    class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-cream to-red-50">
    <div class="max-w-md w-full space-y-8 glass p-8 sm:p-12 rounded-3xl shadow-2xl border border-white">

        <div>
            <h2 class="mt-2 text-center text-4xl font-serif text-ink">
                Welcome <span class="text-crimson-600">Back</span>
            </h2>
            <p class="mt-4 text-center text-gray-600 text-sm">
                Sign in to manage your donations and requests.
            </p>
        </div>

        <form class="mt-8 space-y-6"
            action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}"
            method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

            <div class="space-y-4">
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input id="email" name="email" type="email" required
                        class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-crimson-500 focus:border-crimson-500 transition-colors bg-white/70"
                        placeholder="you@example.com">
                </div>

                <div class="space-y-2 relative">
                    <div class="flex justify-between items-center">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-xs text-crimson-600 hover:text-crimson-800 font-medium">Forgot
                            password?</a>
                    </div>
                    <div class="relative">
                        <input id="password" name="password" type="password" required
                            class="appearance-none block w-full px-4 py-3 pr-12 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-crimson-500 focus:border-crimson-500 transition-colors bg-white/70"
                            placeholder="••••••••">
                        <button type="button"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-crimson-600"
                            onclick="togglePassword()">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="eyeIcon">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="w-full flex justify-center py-4 px-4 border border-transparent rounded-full shadow-md text-lg font-medium text-white bg-crimson-700 hover:bg-crimson-800 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300">
                    Sign In
                </button>
            </div>

            <p class="text-center text-sm text-gray-600 mt-4 border-t border-gray-200 pt-6">
                Don't have an account? <a href="{{ url_for('register_donor') }}"
                    class="font-bold text-crimson-600 hover:text-crimson-800">Register as a donor</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
        }
    }
</script>
{% endblock %}
